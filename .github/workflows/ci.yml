name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/ci.db"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/ci.db"
          NEXTAUTH_SECRET: "ci-build-secret-must-be-32-chars-min!!"
          GROQ_API_KEY: "ci-placeholder-not-used-at-build"

      - name: Staff auth (integration)
        run: npm run test:staff-auth:ci
        env:
          SKIP_BUILD: "1"
          NEXTAUTH_SECRET: "ci-build-secret-must-be-32-chars-min!!"
          GROQ_API_KEY: "ci-placeholder-not-used-at-build"
